{% extends "base.html" %}

{% block announce %}
  <div style="background-color: #f8f9fa; color: #555; border-bottom: 1px solid #ddd; padding: 8px 15px; text-align: center; font-size: 0.85rem;">
    ℹ️ <strong>Hinweis:</strong> Die Inhalte in diesem Projekt wurden durch KI verarbeitet und sind aktuell nicht validiert!
  </div>
{% endblock %}

{% block extrahead %}
  {{ super() }}
  
  <!-- SEO und Open Graph Meta Tags -->
  <meta name="description" content="{{ config.site_description }}">
  
  <!-- Open Graph (Facebook, LinkedIn, Discord etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title | default(config.site_name, true) }}">
  <meta property="og:description" content="{{ config.site_description }}">
  <meta property="og:url" content="{{ config.site_url }}{{ page.url }}">
  <meta property="og:image" content="{{ config.site_url }}og.webp">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default(config.site_name, true) }}">
  <meta name="twitter:description" content="{{ config.site_description }}">
  <meta name="twitter:image" content="{{ config.site_url }}og.webp">
  
  <!-- Cache Control (DSGVO / Reload erzwingen) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
{% endblock %}
